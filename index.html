<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transpose Excel</title>
  </head>
  <body>
    <h1>Transpose an Excel file</h1>

    <input id="file" type="file" accept=".xlsx,.xls" />
    <button id="transposeBtn" disabled>Transpose & Display</button>

    <div id="output" style="margin-top: 16px;"></div>

    <!-- SheetJS (xlsx) -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <script>
      const fileInput = document.getElementById("file");
      const btn = document.getElementById("transposeBtn");
      const output = document.getElementById("output");

      let workbook = null;

      fileInput.addEventListener("change", async (e) => {
        const file = e.target.files?.[0];
        output.innerHTML = "";
        btn.disabled = true;
        workbook = null;

        if (!file) return;

        const arrayBuffer = await file.arrayBuffer();
        workbook = XLSX.read(arrayBuffer, { type: "array" });
        btn.disabled = false;
      });

      function transpose2D(matrix) {
        const rows = matrix.length;
        const cols = Math.max(0, ...matrix.map((r) => r.length));
        const out = Array.from({ length: cols }, () => Array(rows).fill(""));
        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            out[c][r] = matrix[r]?.[c] ?? "";
          }
        }
        return out;
      }

      function toHtmlTable(matrix) {
        const table = document.createElement("table");
        table.border = "1";
        table.cellPadding = "6";

        for (const row of matrix) {
          const tr = document.createElement("tr");
          for (const cell of row) {
            const td = document.createElement("td");
            td.textContent = cell === null || cell === undefined ? "" : String(cell);
            tr.appendChild(td);
          }
          table.appendChild(tr);
        }
        return table;
      }

  btn.addEventListener("click", () => {
    if (!workbook) return;

    const sheetName = workbook.SheetNames[0];
    const sheet = workbook.Sheets[sheetName];

    // Read sheet as 2D array
    const data = XLSX.utils.sheet_to_json(sheet, {
      header: 1,
      defval: ""
    });

    if (data.length < 2) {
      alert("Sheet has no data");
      return;
    }

    const header = data[0];
    const rows = data.slice(1);

    // Find column index for "Gruppenummer"
    const groupColIndex = header.indexOf("Gruppenummer");

    if (groupColIndex === -1) {
      alert('Column "Gruppenummer" not found');
      return;
    }

    // Sort rows numerically by Gruppenummer
    rows.sort((a, b) => {
      const aVal = Number(a[groupColIndex]);
      const bVal = Number(b[groupColIndex]);
      return aVal - bVal;
    });

    // Rebuild sorted table (header + rows)
    const sortedData = [header, ...rows];

    // Transpose
    const transposed = transpose2D(sortedData);

    output.innerHTML = "";
    output.appendChild(
      document.createTextNode(`Sheet: ${sheetName} (sorted by Gruppenummer, then transposed)`)
    );
    output.appendChild(document.createElement("br"));
    output.appendChild(document.createElement("br"));
    output.appendChild(toHtmlTable(transposed));
  });
    </script>
  </body>
</html>
